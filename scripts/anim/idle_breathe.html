<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>idle_breathe</title>
<style>
  html, body { margin: 0; background: #0f0f0f; height: 100%; font-family: "JetBrains Mono", monospace; }
  .stage { width: 100%; height: 100%; display: grid; place-items: center; padding: 8%; box-sizing: border-box; }
  .grid { width: 100%; max-width: 520px; }
</style>
</head>
<body>
  <div class="stage"><div id="grid" class="grid"></div></div>
  <script src="creature-engine.js"></script>
  <script>
    const { BODY, EYE, CREATURE, patch, shift } = window.PixelEngine;

    // Breathing: whole body lifts on inhale
    const INHALE   = shift(CREATURE, -1, 0);
    const INHALE2  = shift(CREATURE, -1, 0); // alias for clarity

    // Eye states on base creature (eyes at r6,r7 cols 7 & 13)
    const HALF_BLINK  = patch(CREATURE, [[6,7,BODY],[6,13,BODY]]);
    const FULL_BLINK  = patch(CREATURE, [[6,7,BODY],[7,7,BODY],[6,13,BODY],[7,13,BODY]]);
    // Eye states on inhaled creature (eyes shifted to r5,r6)
    const INHALE_BLINK = patch(INHALE, [[5,7,BODY],[6,7,BODY],[5,13,BODY],[6,13,BODY]]);

    // Floating dust pixels — appear in empty corner zones
    const DUST_L1  = patch(CREATURE, [[2,1,BODY]]);
    const DUST_L2  = patch(CREATURE, [[1,2,BODY]]);
    const DUST_R1  = patch(CREATURE, [[3,18,BODY]]);
    const DUST_R2  = patch(CREATURE, [[2,17,BODY]]);

    const PRESET = {
      name: "idle breathe",
      category: "Idle",
      description: "Smooth breathing loop, chest rises, mid-cycle blink, ambient dust particles.",
      frames: [
        // --- breath 1 ---
        { hold: 500,  frame: null },         // rest
        { hold: 200,  frame: DUST_L1 },      // dust floats in left
        { hold: 280,  frame: INHALE },       // inhale — body lifts
        { hold: 80,   frame: INHALE_BLINK }, // blink at peak of breath
        { hold: 360,  frame: INHALE },       // hold
        { hold: 200,  frame: DUST_L2 },      // dust drifts (on exhale base)
        { hold: 320,  frame: null },         // exhale — body settles
        { hold: 80,   frame: HALF_BLINK },   // soft eye squint on settle
        // --- pause / hold ---
        { hold: 700,  frame: null },
        // --- breath 2 (slightly longer) ---
        { hold: 200,  frame: DUST_R1 },      // right-side dust
        { hold: 300,  frame: INHALE },       // inhale
        { hold: 500,  frame: INHALE },       // hold longer
        { hold: 200,  frame: DUST_R2 },      // dust drifts
        { hold: 80,   frame: FULL_BLINK },   // full blink on second exhale
        { hold: 80,   frame: HALF_BLINK },
        { hold: 340,  frame: null },         // exhale
      ],
    };

    window.PRESET = PRESET;
    window.PixelEngine.mount(document.getElementById('grid'), { preset: PRESET });
  </script>
</body>
</html>
