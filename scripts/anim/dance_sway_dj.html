<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>dance_sway_dj</title>
<style>
  html,body{margin:0;background:#0f0f0f;height:100%;font-family:monospace}
  .stage{width:100%;height:100%;display:grid;place-items:center;padding:8%;box-sizing:border-box}
  #grid{width:100%;max-width:520px;aspect-ratio:1;display:grid;
    grid-template-columns:repeat(20,1fr);grid-template-rows:repeat(20,1fr);background:#0f0f0f}
</style>
</head>
<body>
<div class="stage"><div id="grid"></div></div>
<script>
/* STANDALONE */
const PAL=['transparent','#CD7F6A','#111111','#c0d8e4','#2d2d2d','#5588cc','#555','#ffffff','#eaf6fc','#7aaabb'];
const E=0,B=1,Y=2,H=3,W=7,HL=8,HS=9;

const host=document.getElementById('grid');
const cells=[];
for(let r=0;r<20;r++){cells.push([]);for(let c=0;c<20;c++){
  const d=document.createElement('div');host.appendChild(d);cells[r].push(d);
}}
function paint(f){
  for(let r=0;r<20;r++)for(let c=0;c<20;c++){
    const v=f[r][c],el=cells[r][c];
    el.style.background=PAL[v]||'transparent';
    el.style.boxShadow=(v&&v!==W)?'inset 0 0 0 1px rgba(0,0,0,0.28)':'none';
  }
}
function sh(f,dr,dc){
  const o=Array.from({length:20},()=>new Array(20).fill(E));
  for(let r=0;r<20;r++)for(let c=0;c<20;c++){
    const nr=r+dr,nc=c+dc;
    if(nr>=0&&nr<20&&nc>=0&&nc<20)o[nr][nc]=f[r][c];
  }
  return o;
}
function pt(f,ops){const o=f.map(r=>r.slice());ops.forEach(([r,c,v])=>{if(r>=0&&r<20&&c>=0&&c<20)o[r][c]=v;});return o;}
function px(f,pts){return pt(f,pts.map(([r,c])=>[r,c,W]));}

// BASE: work_coding-style headphones — wide flat arc + big ear cups
const BASE=[
  [E,E,E,E,E,E,HL,HL,HL,HL,HL,HL,HL,HL,E,E,E,E,E,E],
  [E,E,E,E,E,HL,HS,E,E,E,E,E,E,HS,HL,E,E,E,E,E],
  [E,E,E,E,HL,HS,B,B,B,B,B,B,B,B,HS,HL,E,E,E,E],
  [E,E,E,E,HL,HS,B,B,Y,B,B,B,Y,B,HS,HL,E,E,E,E],
  [E,E,E,E,HL,HS,B,B,B,B,B,B,B,B,HS,HL,E,E,E,E],
  [E,E,E,E,E,E,B,B,B,B,B,B,B,B,E,E,E,E,E,E],
  [E,E,E,B,B,B,B,B,B,B,B,B,B,B,B,B,B,E,E,E],
  [E,E,E,B,B,B,B,B,B,B,B,B,B,B,B,B,B,E,E,E],
  [E,E,E,B,E,B,B,B,B,B,B,B,B,B,B,B,E,B,E,E],
  [E,E,E,E,E,B,B,B,B,B,B,B,B,B,B,B,E,E,E,E],
  [E,E,E,E,E,B,B,B,B,B,B,B,B,B,B,B,E,E,E,E],
  [E,E,E,E,E,B,B,B,B,B,B,B,B,B,B,B,E,E,E,E],
  [E,E,E,E,E,E,E,E,E,E,E,E,E,E,E,E,E,E,E,E],
  [E,E,E,E,E,B,E,E,B,E,E,E,B,E,E,B,E,E,E,E],
  [E,E,E,E,E,B,E,E,B,E,E,E,B,E,E,B,E,E,E,E],
  [E,E,E,E,E,B,E,E,B,E,E,E,B,E,E,B,E,E,E,E],
  [E,E,E,E,E,E,E,E,E,E,E,E,E,E,E,E,E,E,E,E],
  [E,E,E,E,E,E,E,E,E,E,E,E,E,E,E,E,E,E,E,E],
  [E,E,E,E,E,E,E,E,E,E,E,E,E,E,E,E,E,E,E,E],
  [E,E,E,E,E,E,E,E,E,E,E,E,E,E,E,E,E,E,E,E],
];

// Sway arc frames: diagonal to feel groovy
const L1 = sh(BASE,-1,-1); // rise left
const L2 = sh(BASE, 0,-2); // peak left
const L1b= sh(BASE, 0,-1); // level return left
const R1 = sh(BASE,-1, 1); // rise right
const R2 = sh(BASE, 0, 2); // peak right
const R1b= sh(BASE, 0, 1); // level return right

// Headphone secondary lag on peaks — ear cup trails slightly
const L2_lag = pt(L2,[[2,2,HL],[3,2,HL],[2,3,HS],[3,3,HS]]); // ear trails right
const R2_lag = pt(R2,[[2,16,HS],[3,16,HS],[2,17,HL],[3,17,HL]]); // ear trails left

// Floating music note pixel clusters (♪ shape)
const NA=[[1,18,W],[2,18,W],[2,19,W]];  // note top-right
const NB=[[0,16,W],[1,16,W],[1,17,W]];  // note top-right-2
const NC=[[1,1,W],[2,1,W],[2,2,W]];     // note top-left
const ND=[[0,2,W],[1,2,W],[1,3,W]];     // note top-left-2

// Background scattered particles
const TL=[[0,0],[0,1],[1,0]];
const TR=[[0,19],[0,18],[1,19]];
const ML=[[7,0],[8,0]];
const MR=[[7,19],[8,19]];

// Waveform side pulses at sway peaks
const WAVE_L=pt(L2_lag,[[7,0,W],[8,0,W],[9,0,W]]);
const WAVE_R=pt(R2_lag,[[7,19,W],[8,19,W],[9,19,W]]);

const FRAMES=[
  {hold:220, frame:px(BASE,[...TL,...TR])},
  {hold:160, frame:pt(px(BASE,[...TL,...TR]),NA)},   // note appears
  // sway left arc
  {hold:200, frame:px(L1,TR)},
  {hold:220, frame:pt(px(WAVE_L,[...TL,...TR]),NB)},  // peak left + wave + note
  {hold:200, frame:px(L1b,TL)},
  // center
  {hold:160, frame:pt(px(BASE,[...TL,...TR,...MR]),NC)},
  {hold:160, frame:px(BASE,[...TL,...TR,...ML,...MR])},
  // sway right arc
  {hold:200, frame:px(R1,TL)},
  {hold:220, frame:pt(px(WAVE_R,[...TL,...TR]),ND)},  // peak right + wave + note
  {hold:200, frame:px(R1b,TR)},
  // center settle
  {hold:200, frame:pt(px(BASE,[...TL,...TR]),NA)},
  {hold:180, frame:px(BASE,[...TL,...TR,...ML])},
];

let idx=0,startAt=performance.now();
function tick(now){
  if(now-startAt>=FRAMES[idx].hold){idx=(idx+1)%FRAMES.length;startAt=now;paint(FRAMES[idx].frame);}
  requestAnimationFrame(tick);
}
paint(FRAMES[0].frame);
requestAnimationFrame(tick);

window.STANDALONE = true;
window.FRAMES = FRAMES;
window.PAL = PAL;
</script>
</body>
</html>
