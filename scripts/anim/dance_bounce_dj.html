<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>dance_bounce_dj</title>
<style>
  html,body{margin:0;background:#0f0f0f;height:100%;font-family:monospace}
  .stage{width:100%;height:100%;display:grid;place-items:center;padding:8%;box-sizing:border-box}
  #grid{width:100%;max-width:520px;aspect-ratio:1;display:grid;
    grid-template-columns:repeat(20,1fr);grid-template-rows:repeat(20,1fr);
    background:#0f0f0f}
</style>
</head>
<body>
<div class="stage"><div id="grid"></div></div>
<script>
/* STANDALONE */
// ── Multi-color palette ───────────────────────────────────────
// 0=empty  1=body(orange)  2=eye(dark)  3=headphone(gray-blue)
// 7=particle(white)
const PAL=['transparent','#CD7F6A','#111111','#c0d8e4',
           '#2d2d2d','#5588cc','#555555','#ffffff','#eaf6fc','#7aaabb'];
const E=0,B=1,Y=2,H=3,W=7,HL=8,HS=9;

// Build cells
const host=document.getElementById('grid');
const cells=[];
for(let r=0;r<20;r++){cells.push([]);for(let c=0;c<20;c++){
  const d=document.createElement('div');host.appendChild(d);cells[r].push(d);
}}

function paint(f){
  for(let r=0;r<20;r++)for(let c=0;c<20;c++){
    const v=f[r][c],el=cells[r][c];
    el.style.background=PAL[v]||'transparent';
    el.style.boxShadow=(v&&v!==W)?'inset 0 0 0 1px rgba(0,0,0,0.28)':'none';
  }
}

// Frame helpers
function sh(f,dr,dc){
  const o=Array.from({length:20},()=>new Array(20).fill(E));
  for(let r=0;r<20;r++)for(let c=0;c<20;c++){
    const nr=r+dr,nc=c+dc;
    if(nr>=0&&nr<20&&nc>=0&&nc<20)o[nr][nc]=f[r][c];
  }
  return o;
}
function pt(f,ops){const o=f.map(r=>r.slice());ops.forEach(([r,c,v])=>{if(r>=0&&r<20&&c>=0&&c<20)o[r][c]=v;});return o;}
function px(f,pts){return pt(f,pts.map(([r,c])=>[r,c,W]));}

// ── BASE: creature with large DJ headphones (work_coding style) ──
const BASE=[
  [E,E,E,E,E,E,HL,HL,HL,HL,HL,HL,HL,HL,E,E,E,E,E,E],// 0 wide headband top
  [E,E,E,E,E,HL,HS,E,E,E,E,E,E,HS,HL,E,E,E,E,E],    // 1 headband descenders
  [E,E,E,E,HL,HS,B,B,B,B,B,B,B,B,HS,HL,E,E,E,E],    // 2 ear cup top + head
  [E,E,E,E,HL,HS,B,B,Y,B,B,B,Y,B,HS,HL,E,E,E,E],    // 3 ear cups + eyes
  [E,E,E,E,HL,HS,B,B,B,B,B,B,B,B,HS,HL,E,E,E,E],    // 4 ear cup lower
  [E,E,E,E,E,E,B,B,B,B,B,B,B,B,E,E,E,E,E,E],        // 5 head bottom
  [E,E,E,B,B,B,B,B,B,B,B,B,B,B,B,B,B,E,E,E],// 6 wide body
  [E,E,E,B,B,B,B,B,B,B,B,B,B,B,B,B,B,E,E,E],// 7 wide body
  [E,E,E,B,E,B,B,B,B,B,B,B,B,B,B,B,E,B,E,E],// 8 arm nubs
  [E,E,E,E,E,B,B,B,B,B,B,B,B,B,B,B,E,E,E,E],// 9  body
  [E,E,E,E,E,B,B,B,B,B,B,B,B,B,B,B,E,E,E,E],//10  body
  [E,E,E,E,E,B,B,B,B,B,B,B,B,B,B,B,E,E,E,E],//11  body
  [E,E,E,E,E,E,E,E,E,E,E,E,E,E,E,E,E,E,E,E],//12 gap
  [E,E,E,E,E,B,E,E,B,E,E,E,B,E,E,B,E,E,E,E],//13 legs
  [E,E,E,E,E,B,E,E,B,E,E,E,B,E,E,B,E,E,E,E],//14 legs
  [E,E,E,E,E,B,E,E,B,E,E,E,B,E,E,B,E,E,E,E],//15 legs
  [E,E,E,E,E,E,E,E,E,E,E,E,E,E,E,E,E,E,E,E],//16
  [E,E,E,E,E,E,E,E,E,E,E,E,E,E,E,E,E,E,E,E],//17
  [E,E,E,E,E,E,E,E,E,E,E,E,E,E,E,E,E,E,E,E],//18
  [E,E,E,E,E,E,E,E,E,E,E,E,E,E,E,E,E,E,E,E],//19
];

// Bounce frames
const CROUCH = pt(sh(BASE,1,0),[[9,2,B],[9,17,B]]); // squash down
const UP1    = sh(BASE,-1,0);
const UP2    = pt(sh(BASE,-2,0),[[7,1,B],[7,2,B],[7,18,B],[8,1,B]]); // arms wide
const LAND   = pt(BASE,[[16,3,W],[16,4,W],[16,15,W],[16,16,W]]);
const IMPACT = pt(sh(BASE,1,0),[[17,2,W],[17,3,W],[17,16,W],[17,17,W],[10,2,B],[10,17,B]]);

// Particle clusters (in empty corner zones)
const TL=[[0,1],[1,1],[0,2]];
const TR=[[0,18],[1,18],[0,17]];
const ML=[[6,1],[7,0]];
const MR=[[6,19],[7,19]];
const BL=[[17,3],[18,4]];
const BR=[[17,16],[18,15]];
const NOTE_R=[[1,18,W],[2,18,W],[2,19,W]];
const NOTE_L=[[1,1,W],[2,1,W],[2,2,W]];

const FRAMES=[
  {hold:90,  frame:px(CROUCH,[...TL,...TR])},
  {hold:80,  frame:px(UP1,ML)},
  {hold:140, frame:px(UP2,[...TL,...TR,...MR])},
  {hold:80,  frame:px(UP1,TR)},
  {hold:60,  frame:px(LAND,TL)},
  {hold:80,  frame:px(IMPACT,[...BL,...BR])},
  {hold:80,  frame:pt(px(BASE,[...TL,...TR]),NOTE_R)},
  {hold:100, frame:px(BASE,[...TL,...TR])},
  // beat 2
  {hold:90,  frame:px(CROUCH,[...TL,...TR,...ML])},
  {hold:80,  frame:px(UP1,[...TR,...MR])},
  {hold:160, frame:px(UP2,[...TL,...TR,...ML,...MR])},
  {hold:80,  frame:px(UP1,TL)},
  {hold:60,  frame:px(LAND,[...BL,...BR])},
  {hold:80,  frame:px(IMPACT,[...BL,...BR,...MR])},
  {hold:80,  frame:pt(px(BASE,[...TL,...TR,...MR]),NOTE_L)},
  {hold:100, frame:px(BASE,[...TL,...TR,...ML,...MR])},
];

let idx=0,startAt=performance.now();
function tick(now){
  if(now-startAt>=FRAMES[idx].hold){idx=(idx+1)%FRAMES.length;startAt=now;paint(FRAMES[idx].frame);}
  requestAnimationFrame(tick);
}
paint(FRAMES[0].frame);
requestAnimationFrame(tick);

window.STANDALONE = true;
window.FRAMES = FRAMES;
window.PAL = PAL;
</script>
</body>
</html>
