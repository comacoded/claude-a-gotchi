<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>idle_look_around</title>
<style>
  html, body { margin: 0; background: #0f0f0f; height: 100%; font-family: "JetBrains Mono", monospace; }
  .stage { width: 100%; height: 100%; display: grid; place-items: center; padding: 8%; box-sizing: border-box; }
  .grid { width: 100%; max-width: 520px; }
</style>
</head>
<body>
  <div class="stage"><div id="grid" class="grid"></div></div>
  <script src="creature-engine.js"></script>
  <script>
    const { BODY, EYE, CREATURE, patch, shift } = window.PixelEngine;

    // Eyes shift left (remove eyes from cols 7,13 → add to cols 6,12)
    const EYES_L = patch(CREATURE, [
      [6,7,BODY],[7,7,BODY],[6,13,BODY],[7,13,BODY],
      [6,6,EYE],[7,6,EYE],[6,12,EYE],[7,12,EYE],
    ]);
    // Head follows left (whole body)
    const HEAD_L = shift(CREATURE, 0, -1);
    const HEAD_L_EYES = patch(HEAD_L, [
      [6,6,BODY],[7,6,BODY],[6,12,BODY],[7,12,BODY],  // clear default eyes (shifted)
      [6,5,EYE],[7,5,EYE],[6,11,EYE],[7,11,EYE],       // eyes shifted further left
    ]);

    // Eyes shift right
    const EYES_R = patch(CREATURE, [
      [6,7,BODY],[7,7,BODY],[6,13,BODY],[7,13,BODY],
      [6,8,EYE],[7,8,EYE],[6,14,EYE],[7,14,EYE],
    ]);
    // Head follows right
    const HEAD_R = shift(CREATURE, 0, 1);
    const HEAD_R_EYES = patch(HEAD_R, [
      [6,8,BODY],[7,8,BODY],[6,14,BODY],[7,14,BODY],
      [6,9,EYE],[7,9,EYE],[6,15,EYE],[7,15,EYE],
    ]);

    // Look up — eyes move to row 5 (single pixel, curious gaze)
    const EYES_UP = patch(CREATURE, [
      [6,7,BODY],[7,7,BODY],[6,13,BODY],[7,13,BODY],
      [5,7,EYE],[5,13,EYE],
    ]);
    // Head tilts up slightly
    const HEAD_UP = shift(CREATURE, -1, 0);
    const HEAD_UP_EYES = patch(HEAD_UP, [
      [5,7,BODY],[6,7,BODY],[5,13,BODY],[6,13,BODY],
      [4,7,EYE],[4,13,EYE],
    ]);

    // Eyebrow curiosity hint (pixel above eyes on base)
    const CURIOUS = patch(CREATURE, [[5,6,BODY],[5,14,BODY]]);

    const PRESET = {
      name: "idle look around",
      category: "Idle",
      description: "Eyes move first, head follows. Glance left, right, then up. Curious and alive.",
      frames: [
        { hold: 800,  frame: null },
        // glance left: eyes first, then head
        { hold: 200,  frame: EYES_L },
        { hold: 500,  frame: HEAD_L_EYES },
        { hold: 300,  frame: EYES_L },
        { hold: 200,  frame: null },
        // brief center rest
        { hold: 400,  frame: CURIOUS },
        { hold: 400,  frame: null },
        // glance right: eyes first, then head
        { hold: 200,  frame: EYES_R },
        { hold: 500,  frame: HEAD_R_EYES },
        { hold: 300,  frame: EYES_R },
        { hold: 200,  frame: null },
        // center rest
        { hold: 500,  frame: null },
        // look up: eyes first, then head
        { hold: 200,  frame: EYES_UP },
        { hold: 400,  frame: HEAD_UP_EYES },
        { hold: 300,  frame: EYES_UP },
        { hold: 200,  frame: null },
        // settle
        { hold: 700,  frame: null },
      ],
    };

    window.PRESET = PRESET;
    window.PixelEngine.mount(document.getElementById('grid'), { preset: PRESET });
  </script>
</body>
</html>
