<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>expression_sleep</title>
<style>
  html, body { margin: 0; background: #0f0f0f; height: 100%; font-family: "JetBrains Mono", monospace; }
  .stage { width: 100%; height: 100%; display: grid; place-items: center; padding: 8%; box-sizing: border-box; }
  .grid { width: 100%; max-width: 520px; }
</style>
</head>
<body>
  <div class="stage"><div id="grid" class="grid"></div></div>
  <script src="creature-engine.js"></script>
  <script>
    const { BODY, EYE, CREATURE, patch, shift } = window.PixelEngine;

    // Eyes closed (both eye columns → body)
    const SLEEP = patch(CREATURE, [
      [6,7,BODY],[7,7,BODY],[6,13,BODY],[7,13,BODY],
    ]);

    // Gentle breathing nod: body shifts down 1 (exhale/nod down)
    const NOD_DOWN = shift(SLEEP, 1, 0);
    // Body shifts up 1 (inhale)
    const NOD_UP   = shift(SLEEP, -1, 0);

    // Z particles — ascend up-right in sequence
    // Z1: just appeared near top of head
    const Z1 = patch(SLEEP, [[3,15,BODY],[3,16,BODY],[4,15,BODY],[4,16,BODY]]);
    // Z2: Z1 has risen, new smaller Z near head
    const Z2 = patch(SLEEP, [[2,16,BODY],[2,17,BODY],[3,16,BODY],[3,17,BODY],[4,15,BODY]]);
    // Z3: both Zs risen further
    const Z3 = patch(SLEEP, [[1,17,BODY],[1,18,BODY],[2,17,BODY],[2,18,BODY],[3,16,BODY]]);
    // Z4: Zs near top edge, fading (fewer pixels)
    const Z4 = patch(SLEEP, [[0,18,BODY],[1,18,BODY],[2,17,BODY]]);
    // Z fade out
    const Z5 = patch(SLEEP, [[0,18,BODY],[0,19,BODY]]);

    // Nod variants with Z active
    const NOD_DOWN_Z = patch(NOD_DOWN, [[4,15,BODY],[4,16,BODY]]);
    const NOD_UP_Z2  = patch(NOD_UP,   [[2,16,BODY],[2,17,BODY],[3,16,BODY]]);

    const PRESET = {
      name: "expression sleep",
      category: "Expressions",
      description: "Peaceful sleep with rhythmic head nod breathing, ascending Z particles.",
      frames: [
        // settle into sleep
        { hold: 600,  frame: SLEEP },
        { hold: 400,  frame: NOD_DOWN },
        { hold: 300,  frame: SLEEP },
        // Z sequence 1 emerges
        { hold: 300,  frame: Z1 },
        { hold: 300,  frame: NOD_DOWN_Z },
        { hold: 300,  frame: Z1 },
        { hold: 300,  frame: Z2 },
        { hold: 300,  frame: NOD_UP_Z2 },
        { hold: 300,  frame: Z3 },
        { hold: 300,  frame: NOD_DOWN },
        { hold: 300,  frame: Z4 },
        { hold: 300,  frame: SLEEP },
        { hold: 300,  frame: Z5 },
        { hold: 400,  frame: NOD_UP },
        // long peaceful rest
        { hold: 700,  frame: SLEEP },
        { hold: 400,  frame: NOD_DOWN },
        { hold: 500,  frame: SLEEP },
        // Z sequence 2 (slightly offset for variety)
        { hold: 300,  frame: Z1 },
        { hold: 300,  frame: Z2 },
        { hold: 300,  frame: NOD_UP },
        { hold: 300,  frame: Z3 },
        { hold: 300,  frame: Z4 },
        { hold: 300,  frame: Z5 },
        { hold: 400,  frame: SLEEP },
      ],
    };

    window.PRESET = PRESET;
    window.PixelEngine.mount(document.getElementById('grid'), { preset: PRESET });
  </script>
</body>
</html>
