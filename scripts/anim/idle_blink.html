<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>idle_blink</title>
<style>
  html, body { margin: 0; background: #0f0f0f; height: 100%; font-family: "JetBrains Mono", monospace; }
  .stage { width: 100%; height: 100%; display: grid; place-items: center; padding: 8%; box-sizing: border-box; }
  .grid { width: 100%; max-width: 520px; }
</style>
</head>
<body>
  <div class="stage"><div id="grid" class="grid"></div></div>
  <script src="creature-engine.js"></script>
  <script>
    const { BODY, EYE, CREATURE, patch } = window.PixelEngine;

    // Eye states — half blink closes only the top row of each eye
    const HALF_BLINK = patch(CREATURE, [
      [6,7,BODY],[6,13,BODY],
    ]);
    const FULL_BLINK = patch(CREATURE, [
      [6,7,BODY],[7,7,BODY],[6,13,BODY],[7,13,BODY],
    ]);

    // Eyes glance slightly down before/after blink (natural micro-movement)
    const GLANCE_DOWN = patch(CREATURE, [
      [6,7,BODY],[6,13,BODY],            // close top row
      [8,7,EYE],[8,13,EYE],              // eyes appear one row lower
    ]);

    // Tiny eyebrow-raise hint: add single pixels above eyes
    const EYEBROW = patch(CREATURE, [
      [5,7,BODY],[5,13,BODY],            // subtle brow pixel
    ]);

    const PRESET = {
      name: "idle blink",
      category: "Idle",
      description: "Natural blink with half-close, double-blink sequence, and subtle gaze shifts.",
      frames: [
        // — long open gaze —
        { hold: 2400, frame: null },
        // — single blink —
        { hold: 60,   frame: HALF_BLINK },
        { hold: 100,  frame: FULL_BLINK },
        { hold: 60,   frame: HALF_BLINK },
        { hold: 80,   frame: null },
        // — eyes shift slightly, re-focus —
        { hold: 220,  frame: GLANCE_DOWN },
        { hold: 1600, frame: null },
        // — double blink —
        { hold: 60,   frame: HALF_BLINK },
        { hold: 90,   frame: FULL_BLINK },
        { hold: 60,   frame: HALF_BLINK },
        { hold: 70,   frame: null },
        { hold: 60,   frame: FULL_BLINK },
        { hold: 100,  frame: HALF_BLINK },
        { hold: 70,   frame: null },
        // — eyebrow micro-raise, settle —
        { hold: 200,  frame: EYEBROW },
        { hold: 900,  frame: null },
      ],
    };

    window.PRESET = PRESET;
    window.PixelEngine.mount(document.getElementById('grid'), { preset: PRESET });
  </script>
</body>
</html>
