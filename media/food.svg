<svg viewBox="0 0 16 12" width="22" height="17" shape-rendering="crispEdges" xmlns="http://www.w3.org/2000/svg">
  <!-- top bun -->
  <rect x="4" y="0" width="8"  height="1" fill="#f0bd6e"/>
  <rect x="2" y="1" width="12" height="1" fill="#e6ad5c"/>
  <rect x="1" y="2" width="14" height="1" fill="#e3a455"/>
  <rect x="1" y="3" width="14" height="1" fill="#cf8f3e"/>
  <!-- sesame seeds -->
  <rect x="5"  y="1" width="1" height="1" fill="#fff6dd"/>
  <rect x="8"  y="2" width="1" height="1" fill="#fff6dd"/>
  <rect x="10" y="1" width="1" height="1" fill="#fff6dd"/>
  <!-- lettuce -->
  <rect x="0" y="4" width="16" height="1" fill="#7ec24a"/>
  <rect x="1"  y="5" width="2" height="1" fill="#7ec24a"/>
  <rect x="5"  y="5" width="2" height="1" fill="#7ec24a"/>
  <rect x="9"  y="5" width="2" height="1" fill="#7ec24a"/>
  <rect x="13" y="5" width="2" height="1" fill="#7ec24a"/>
  <!-- patty -->
  <rect x="1" y="6" width="14" height="1" fill="#7a4a2a"/>
  <rect x="1" y="7" width="14" height="1" fill="#693c20"/>
  <!-- cheese -->
  <rect x="1" y="8" width="14" height="1" fill="#ffc34d"/>
  <!-- bottom bun -->
  <rect x="2" y="9"  width="12" height="1" fill="#e3a455"/>
  <rect x="2" y="10" width="12" height="1" fill="#cf8f3e"/>
  <rect x="4" y="11" width="8"  height="1" fill="#b97e35"/>
  <!-- cheese drips (on top of bun) -->
  <rect x="4"  y="9" width="1" height="1" fill="#ffc34d"/>
  <rect x="10" y="9" width="1" height="1" fill="#ffc34d"/>
